* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #bdb8ae;

  padding: 24px 16px 40px;
}

.hint {
  text-align: center;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  letter-spacing: .28em;
  color: #88807a;
  margin-bottom: 16px;

/* ── PAGE: landscape A4 297×210mm ── */
.page {
  width: 1123px;
  min-height: 794px;
  margin: 0 auto;
  background: #f3ede2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.hd {
  padding: 32px 56px 20px;
  border-bottom: 0.5px solid rgba(42,35,24,.15);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}
.hd-left { display: flex; flex-direction: column; gap: 3px; }
.hd-en { font-size: 9px; letter-spacing: .55em; color: rgba(42,35,24,.3); font-family: 'Noto Sans TC', sans-serif; }
.hd-sub { font-size: 13px; font-weight: 300; letter-spacing: .28em; color: rgba(42,35,24,.5); }
.hd-main { font-size: 46px; font-weight: 200; letter-spacing: .44em; color: #2a2318; line-height: 1; }
.hd-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
.hd-num { font-size: 46px; font-weight: 200; color: #2a2318; line-height: 1; }
.hd-yl { font-size: 8.5px; letter-spacing: .55em; color: rgba(42,35,24,.28); font-family: 'Noto Sans TC', sans-serif; }

/* ── TIMELINE ── */
.tl {
  padding: 12px 56px;
  display: flex;
  align-items: center;
  border-bottom: 0.5px solid rgba(42,35,24,.1);
}
.tl-seg { flex: 1; height: 0.5px; background: rgba(42,35,24,.22); }
.tl-n { display: flex; flex-direction: column; align-items: center; }
.tl-d { width: 7px; height: 7px; border-radius: 50%; border: 1px solid rgba(42,35,24,.28); background: #f3ede2; z-index: 1; }
.tl-d.big { width: 11px; height: 11px; background: #8b3a1f; border-color: #8b3a1f; }
.tl-y { font-size: 8px; color: rgba(42,35,24,.42); margin-top: 4px; font-family: 'Noto Sans TC', sans-serif; }

/* ── CARDS ── */
.cards { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.card { padding: 20px 24px 20px; position: relative; display: flex; flex-direction: column; border-right: 0.5px solid rgba(42,35,24,.12); }
.card:last-child { border-right: none; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px; }
.ca::before { background: #7a9e72; }
.cb::before { background: #c4634a; }
.cc::before { background: #c9a040; }
.cd::before { background: #5c4f3a; }

.tz { display: flex; align-items: flex-end; justify-content: center; margin-bottom: 12px; height: 80px; }
.c-era { font-size: 26px; font-weight: 200; letter-spacing: .1em; color: #2a2318; margin-bottom: 2px; }
.c-range { font-size: 8px; letter-spacing: .32em; color: rgba(42,35,24,.32); font-family: 'Noto Sans TC', sans-serif; display: block; margin-bottom: 6px; }
.c-sub { font-size: 11px; font-weight: 300; letter-spacing: .1em; color: rgba(42,35,24,.6); margin-bottom: 10px; line-height: 1.4; }

/* ── NEW ILLUSTRATION STYLE ── */
.scene-box {
  width: 100%;
  height: 90px;
  margin: 5px 0 15px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.rule { width: 20px; height: 0.5px; background: rgba(42,35,24,.25); margin-bottom: 12px; }
.ev { list-style: none; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.ev li { display: flex; gap: 8px; align-items: flex-start; }
.dt { font-size: 9px; color: rgba(42,35,24,.35); font-family: 'Noto Sans TC', sans-serif; min-width: 40px; flex-shrink: 0; padding-top: 2px; }
.tx { font-size: 10px; line-height: 1.6; color: #2a2318; font-weight: 300; }
.sub-hd { font-size: 8.5px; letter-spacing: .2em; color: #a07810; border-left: 1.5px solid #c9a040; padding-left: 6px; margin: 8px 0 5px; font-weight: 400; }

.footer { background: #2a2318; padding: 15px; text-align: center; }
.footer-t { font-size: 11px; letter-spacing: .2em; color: rgba(243,237,226,.5); font-style: italic; }

[contenteditable] { outline: none; }
[contenteditable]:hover { background: rgba(160,120,16,.05); }

@media print {
  body { background: white; padding: 0; }
  .hint { display: none; }
  @page { size: A4 landscape; margin: 0; }
}
</style>
</head>
